# ST1005 requires lowercase, unpunctuated error strings, on the assumption that
# errors get wrapped into longer sentences. That does not hold here: engine and
# server error strings are surfaced verbatim to the user as UI copy — the HTML
# fragment rendered into #omni-status is literally err.Error(). Lowercasing them
# would make the UI worse to satisfy a convention whose premise does not apply.
#
# This is documented as a contract in engine/CLAUDE.md.
checks = ["inherit", "-ST1005"]
