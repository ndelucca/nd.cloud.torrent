# No suppressions.
#
# ST1005 (lowercase, unpunctuated error strings) was disabled here because
# engine and server error strings were surfaced to the user verbatim as UI copy.
# server.classify now owns that presentation — it decides both the status and
# the message, capitalising input errors for display and replacing operational
# ones with a fixed message — so the error strings themselves are conventional
# again and the suppression is gone.
checks = ["inherit"]
