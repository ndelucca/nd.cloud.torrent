# test this file with
#   goreleaser build --snapshot --config .github/goreleaser.yml
version: 2
builds:
  - env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
      # openbsd is not built: anacrolix/torrent's storage package does not
      # compile there (undefined: unix.SEEK_DATA), still true as of v1.61.0.
      # Leaving it listed fails the whole release, not just that artifact.
    goarch:
      - '386'
      - amd64
      - arm
      - arm64
    goarm:
      - '6'
      - '7'
nfpms:
  - maintainer: "https://github.com/{{ .Env.GITHUB_USER }}"
    formats:
      - deb
      - rpm
      - apk
archives:
  - format: gz
    files:
      - none*
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
