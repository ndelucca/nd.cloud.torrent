name: CI
on:
  pull_request: {}
  push:
    branches: ["master", "refactor/**"]
    tags: ["v*"]

# Least privilege by default; jobs that need more opt in explicitly.
permissions:
  contents: read

jobs:
  # ================
  # BUILD AND TEST JOB
  # ================
  test:
    name: Build & Test
    strategy:
      fail-fast: false
      matrix:
        # Must stay >= the `go` directive in go.mod.
        go-version: ["1.25"]
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true
          cache: true
      - name: gofmt
        if: matrix.platform == 'ubuntu-latest'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt'd:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: Build
        run: go build -v -o /dev/null .
      # -short on macos and windows skips the two wall-clock tests
      # (TestIdleServerIsQuiet, TestRunShutsDownPromptlyWithSSEClients). They
      # assert timing, and these are the slowest and most contended runners, so
      # a failure there is far more likely to be the runner than the code. Linux
      # runs the full set.
      - name: Test (race)
        if: matrix.platform == 'ubuntu-latest'
        run: go test -race -v ./...
      - name: Test (race, short)
        if: matrix.platform != 'ubuntu-latest'
        run: go test -race -v -short ./...
      # -coverpkg=./... so cross-package exercise is attributed. Without it the
      # web fragment handlers report 0.0% while server tests drive them through
      # the real mux, which understated the total by ~6 points — hiding real
      # gaps behind fake ones. Reuses the -race profile rather than re-running
      # the suite uninstrumented.
      - name: Coverage
        if: matrix.platform == 'ubuntu-latest'
        run: |
          go test -race -coverpkg=./... -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1
      - name: go mod tidy is clean
        if: matrix.platform == 'ubuntu-latest'
        run: |
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum; then
            echo "go.mod/go.sum are not tidy; run 'go mod tidy' and commit:"
            git diff -- go.mod go.sum
            exit 1
          fi

  # ================
  # ARCHITECTURAL BOUNDARIES
  # ================
  # Each of these was stated as a binding contract in a CLAUDE.md and enforced
  # by nothing but memory. They are one line each; the dependency graph is the
  # repo's central architectural asset and deserves a gate, not a convention.
  boundaries:
    name: Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      # Every check below runs `go list`/`go mod` in its own command, so a
      # tooling failure aborts the step under `set -e` instead of being read as
      # "nothing matched". Only the greps are allowed to come back empty.
      #
      # web renders and server routes. The standing temptation is for web to
      # reach for server state; the moment that edge exists the split is undone.
      - name: web must not import server
        run: |
          set -euo pipefail
          if go list -deps ./web | grep -q 'nd\.cloud\.torrent/server'; then
            echo "web imports server; the rendering/routing split is broken"; exit 1
          fi
      # Anything producing HTML belongs in web.
      #
      # Direct imports, not `go list -deps`: server legitimately reaches
      # html/template transitively through web, so the dependency closure can
      # never answer this question. Not a grep either -- that matched the string
      # in comments and in _test.go files, missed text/template, and its -r was
      # inert against a `server/*.go` glob that had already expanded.
      - name: server must not import html/template
        run: |
          set -euo pipefail
          imports=$(go list -f '{{join .Imports "\n"}}' ./server)
          if printf '%s\n' "$imports" | grep -qxE '(html|text)/template'; then
            echo "server renders HTML; move it to the web package"; exit 1
          fi
      # internal/{auth,cli,reqlog} exist to remove these. A reappearance means
      # a replacement was quietly reverted.
      - name: no jpillora modules
        run: |
          set -euo pipefail
          graph=$(go mod graph)
          n=$(printf '%s\n' "$graph" | grep -c jpillora || true)
          if [ "$n" != "0" ]; then
            echo "jpillora modules are back in the graph ($n edges)"; exit 1
          fi
      # The leaf packages carry their own no-dependency contracts, each stated
      # in a CLAUDE.md. A stdlib import path has no dot in its first segment,
      # which is what the first grep selects; the second drops this module's own
      # packages, leaving only third-party.
      - name: leaf packages stay stdlib-only
        run: |
          set -euo pipefail
          deps=$(go list -deps ./files ./fetch ./internal/auth ./internal/cli ./internal/reqlog)
          third=$(printf '%s\n' "$deps" \
            | grep -E '^[^/]+\.' \
            | grep -v '^github\.com/ndelucca/nd\.cloud\.torrent' || true)
          if [ -n "$third" ]; then
            echo "these packages must not depend on anything outside the stdlib:"
            printf '%s\n' "$third"; exit 1
          fi
      # sysstat is the only place gopsutil is imported, so the platform detail
      # it encapsulates has exactly one home.
      - name: sysstat owns the gopsutil import
        run: |
          set -euo pipefail
          users=$(go list -f '{{.ImportPath}} {{join .Imports " "}}' ./...)
          other=$(printf '%s\n' "$users" \
            | grep gopsutil \
            | grep -v '^github\.com/ndelucca/nd\.cloud\.torrent/sysstat ' || true)
          if [ -n "$other" ]; then
            echo "gopsutil must be imported only by sysstat; also imported by:"
            printf '%s\n' "$other"; exit 1
          fi
      # The vendored JS has no package.json and no build step, so static/VENDOR
      # is the only record of what those bundles are. This keeps it honest:
      # every hash is recomputed from the file on disk and matched against both
      # the manifest and the integrity= attribute the page ships.
      #
      # A wrong integrity value is invisible server-side — the browser refuses
      # to run the script and the UI is dead with no error anywhere — which is
      # why this is a gate and not a convention.
      - name: vendored JS matches its manifest
        run: |
          set -euo pipefail
          fail=0
          for f in static/files/js/vendor/*.js; do
            name=$(basename "$f")
            got="sha384-$(openssl dgst -sha384 -binary "$f" | openssl base64 -A)"
            if ! grep -qF "$got" static/VENDOR; then
              echo "$name: hash $got is not in static/VENDOR"; fail=1
            fi
            if ! grep -qF "$got" web/templates/page.html; then
              echo "$name: hash $got is not the integrity= in page.html"; fail=1
            fi
          done
          # And the other direction: an integrity= naming a file that is gone.
          for h in $(grep -o 'integrity="sha384-[^"]*"' web/templates/page.html | sed 's/integrity="//;s/"//'); do
            found=0
            for f in static/files/js/vendor/*.js; do
              [ "sha384-$(openssl dgst -sha384 -binary "$f" | openssl base64 -A)" = "$h" ] && found=1 && break
            done
            [ "$found" = 0 ] && echo "page.html pins $h, which matches no vendored file" && fail=1
          done
          exit $fail

      # configfile is named for the file, not the type: the config itself lives
      # in the engine. Anything else it imports is a second copy waiting to be.
      - name: configfile imports only engine
        run: |
          set -euo pipefail
          imports=$(go list -f '{{join .Imports "\n"}}' ./configfile)
          extra=$(printf '%s\n' "$imports" \
            | grep -E '^[^/]+\.' \
            | grep -v '^github\.com/ndelucca/nd\.cloud\.torrent/engine$' || true)
          if [ -n "$extra" ]; then
            echo "configfile may import engine and the stdlib, nothing else:"
            printf '%s\n' "$extra"; exit 1
          fi

  # ================
  # STATIC ANALYSIS + VULN SCAN
  # ================
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      # Pinned rather than "latest": this is the security job, and a tool that
      # moves under us can break the build or, worse, quietly stop checking.
      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "2025.1.1"
          install-go: false
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  # ================
  # PACKAGING DRY RUN (everything except a tag)
  # ================
  # The release jobs below are the only consumers of goreleaser.yml and the
  # Dockerfile, and they are gated on a v* tag — so a broken packaging config
  # used to be discovered *during* a release, on a tag that is already public.
  # This builds both without publishing either. It is the only irreversible
  # operation in the pipeline, so it is the one that most needs a rehearsal.
  release_build:
    name: Packaging Dry Run
    if: "!startsWith(github.ref, 'refs/tags/v')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: goreleaser build (snapshot)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --snapshot --clean --config .github/goreleaser.yml
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # amd64 only and no push: this is a compile check on the Dockerfile, not
      # a release. The multi-arch matrix belongs to the tagged job.
      - name: docker build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/Dockerfile
          platforms: linux/amd64
          push: false
          # Loaded into the local daemon so the next step can actually run it.
          load: true
          tags: nd-cloud-torrent:ci
          build-args: |
            VERSION=0.0.0-ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Building the image only proves it compiles. This proves it *runs* — and
      # specifically that it runs with NO mounts, which is the case that was
      # broken: the run stage is `scratch` and `USER 65534`, so /app and
      # /app/downloads have to be created and chowned in the build stage or the
      # process cannot write either one. configfile.Save writes a temp file
      # beside the config and renames, so /app itself must be writable, not just
      # the file.
      #
      # No --user here: the point is to exercise the USER the image declares.
      - name: docker run (no mounts, as the published image runs)
        run: |
          set -euo pipefail
          trap 'docker logs ct 2>&1 | tail -40; docker rm -f ct >/dev/null 2>&1 || true' EXIT
          docker run -d --name ct -p 3000:3000 nd-cloud-torrent:ci

          # Wait for it to serve rather than sleeping a guessed interval.
          for i in $(seq 1 60); do
            curl -fsS -o /dev/null http://127.0.0.1:3000/ && break
            [ "$i" = 60 ] && { echo "the container never served a page"; exit 1; }
            sleep 0.5
          done

          # Exercise the USER the image declares, not one passed at run time.
          got=$(docker inspect -f '{{.Config.User}}' ct)
          [ "$got" = "65534:65534" ] || { echo "runs as '$got', want 65534:65534"; exit 1; }

          # /app must be owned by that UID, and so must /app/downloads. `docker
          # cp` streams a tar with ownership intact, which is the only way to
          # read it: the run stage is `scratch`, so there is no shell to exec.
          # --numeric-owner is required: without it GNU tar resolves 65534 to
          # the local name (nobody) and the check below never matches, even when
          # the ownership is exactly right.
          docker cp ct:/app - | tar --numeric-owner -tvf - | awk '{print $2, $6}' > /tmp/own.txt
          cat /tmp/own.txt
          grep -q '65534/65534 app/downloads/' /tmp/own.txt || {
            echo "/app/downloads is missing or not owned by 65534"; exit 1; }

          # The write that was broken. configfile.Save writes a temp file beside
          # the config and renames it, so this needs /app itself writable — not
          # just a writable file. Same-origin because requireSameOrigin gates it.
          code=$(curl -s -o /tmp/body -w '%{http_code}' -X POST \
            -H 'Origin: http://127.0.0.1:3000' \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            --data 'AutoStart=false&AutoStart=true' \
            http://127.0.0.1:3000/api/configure)
          [ "$code" = "200" ] || { echo "POST /api/configure = $code"; cat /tmp/body; exit 1; }

          # And it really landed on disk, rather than being reported OK. A 200
          # with no file is exactly what a silent write failure would look like.
          docker cp ct:/app/cloud-torrent.json /tmp/saved.json
          grep -q '"AutoStart": true' /tmp/saved.json || {
            echo "the saved config does not contain what was posted:"; cat /tmp/saved.json; exit 1; }

          # A permission failure anywhere else shows up here.
          docker logs ct 2>&1 | grep -i 'permission denied' && {
            echo "the container reported a permission error"; exit 1; } || true

  # ================
  # RELEASE BINARIES (on push "v*" tag)
  # ================
  release_binaries:
    name: Release Binaries
    needs: [test, analyze, boundaries]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --config .github/goreleaser.yml
        env:
          GITHUB_USER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ================
  # RELEASE DOCKER IMAGES (on push "v*" tag)
  # ================
  release_docker:
    name: Release Docker Images
    needs: [test, analyze, boundaries]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          # goreleaser and the Dockerfile both derive the version from tags.
          fetch-depth: 0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
