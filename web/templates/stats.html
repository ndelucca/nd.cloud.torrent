{{define "stats"}}
<div class="stats-inner">
  {{if gt .ConnectedUsers 1}}
  <span class="stat users" title="Browsers connected">{{.ConnectedUsers}} users</span>
  {{end}}
  {{if .Set}}
  <span class="stat" title="CPU usage">cpu {{round .CPU}}%</span>
  <span class="stat" title="Memory usage">mem {{round .MemPercent}}%</span>
  <span class="stat" title="Disk usage">disk {{round .DiskPercent}}% &middot; {{bytes .DiskFree}} free</span>
  {{end}}
  <span class="stat" title="Go heap">heap {{bytes .GoMemory}}</span>
  <span class="stat" title="Goroutines">{{.GoRoutines}} goroutines</span>
  <span class="stat" title="Cloud Torrent {{.Version}}, built with Go {{.Runtime}}">{{.Version}}</span>
  <span class="stat" title="Started {{.Started}}">up {{.Uptime}}</span>
</div>
{{end}}
